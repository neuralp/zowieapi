openapi: 3.0.3
info:
  title: ZowieTek Device API
  description: |
    REST API for controlling ZowieTek devices (ZowieBox, ZowiePTZ, ZowieCam, MediDVR, etc.).
    All endpoints use POST requests. The device IP replaces `{host}` in the server URL.

    **Authentication:** Use `login_check_flag=1` as a query parameter on all requests.

    **Status Codes:**
    - `00000` — Success
    - `00002` — Program not ready
    - `00003` — Missing required parameters
    - `00004` — Product not supported
    - `00005` — Switch opening failed
    - `00006` — Switch not open
    - `00007` — Enable not open
    - `00008` — Verification code error
    - `00009` — Operation too fast
    - `00010` — Restarting, please wait
    - `50001` — NDI activation failed
    - `60001–60013` — Streaming errors
    - `70001–70016` — Network errors
    - `80001–80009` — User management errors
    - `100001–100015` — Storage errors
    - `110001–110008` — Recording task errors
    - `140001–140006` — Decoding errors
  version: '1.5'
  contact:
    name: 'Zowietek Electronics, Ltd.'
    email: support@zowietek.com
servers:
  - url: 'http://{host}'
    description: Device IP address
    variables:
      host:
        default: 192.168.1.1
        description: IP address of the ZowieTek device
security:
  - login_check_flag: []
tags:
  - name: Input/Output
    description: HDMI input/output signal and settings
  - name: PTZ Camera Control (ZowieBox)
    description: Control an external PTZ camera from ZowieBox
  - name: PTZ Control
    description: 'Direct PTZ movement, focus, zoom, and preset control'
  - name: Encoding
    description: Video encoding parameters
  - name: Decoding
    description: Stream decoding (RTSP/RTMP/SRT)
  - name: NDI Decoding
    description: NDI source discovery and decoding
  - name: NDI
    description: NDI encoding configuration and activation
  - name: Audio
    description: Audio configuration and switch
  - name: Streaming
    description: Stream publishing management
  - name: AP
    description: Wi-Fi Access Point configuration
  - name: LAN
    description: Local Area Network configuration
  - name: WiFi
    description: Wi-Fi client configuration
  - name: Port
    description: Service port configuration
  - name: mDNS
    description: mDNS hostname configuration
  - name: User Management
    description: Account management and authentication
  - name: Device Time
    description: System time management
  - name: Recording
    description: Recording tasks and file management
  - name: Snapshot
    description: Snapshot capture and retrieval
  - name: Tally
    description: Tally LED control
  - name: Restore & Reboot
    description: 'System reboot, factory reset, standby'
  - name: Image Settings
    description: 'Camera exposure, color, and image settings'
  - name: Patient Case
    description: Medical patient case management (MediDVR)
  - name: Pan/Tilt/Zoom/Focus Control
    description: PTZ and focus control via ptzctrl endpoint
  - name: Temperature
    description: Device CPU temperature
paths:
  /video:
    post:
      tags:
        - Input/Output
        - Encoding
        - NDI
      summary: Video endpoint (multi-purpose)
      description: |
        Multi-purpose video endpoint covering input/output, encoding, and NDI operations.
        The `option` query parameter selects `getinfo` or `setinfo`; the `group` and `opt` fields in the body select the specific operation.

        **Input/Output (group=hdmi):** Detect HDMI input signal resolution and audio sample rate (ZowieBox only);
        get or set output resolution, audio mute, and loop-out mode (ZowieBox, ZowieCam, ZowiePTZ).

        **Encoding (group=all / group=venc):** Retrieve all encoding parameters or modify codec (H.264/H.265/MJPEG),
        profile (BP/MP/HP), rate control (CBR/VBR), bitrate, resolution, frame rate, GOP, QP values, and rotation
        for main, sub, and snapshot streams (ZowieBox, ZowieCam, ZowiePTZ).

        **Digital Zoom (group=digital_zoom):** Get or set digital zoom magnification (100–1200×) and enable/disable
        digital zoom (ZowiePTZ, ZowieCam).

        **NDI (group=ndi):** Activate NDI with a license key, retrieve the saved license key, get or set NDI device
        name/group/multicast configuration (NDI|HX / HX2 / HX3), and toggle NDI encoding on/off
        (ZowieBox, ZowieCam, ZowiePTZ).
      operationId: videoEndpoint
      parameters:
        - $ref: '#/components/parameters/OptionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/GetInputInfoRequest'
                - $ref: '#/components/schemas/SetOutputInfoRequest'
                - $ref: '#/components/schemas/GetOutputInfoRequest'
                - $ref: '#/components/schemas/GetEncodingRequest'
                - $ref: '#/components/schemas/SetEncodingRequest'
                - $ref: '#/components/schemas/GetDigitalZoomRequest'
                - $ref: '#/components/schemas/SetDigitalZoomRequest'
                - $ref: '#/components/schemas/NdiActivateRequest'
                - $ref: '#/components/schemas/GetNdiLicenseRequest'
                - $ref: '#/components/schemas/GetNdiInfoRequest'
                - $ref: '#/components/schemas/SetNdiInfoRequest'
                - $ref: '#/components/schemas/NdiSwitchRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /ptz:
    post:
      tags:
        - PTZ Camera Control (ZowieBox)
        - PTZ Control
        - Image Settings
      summary: PTZ endpoint (multi-purpose)
      description: |
        Multi-purpose PTZ endpoint covering camera connection configuration, movement control, focus/zoom settings, and aperture.

        **PTZ Camera Config (group=ptz, ZowieBox):** Get or set the protocol (Auto/VISCA over IP/VISCA/Pelco-D/Pelco-P),
        IP address, port, baud rate, and camera address used to control an external PTZ camera.

        **PTZ Movement Control (group=ptz, ZowiePTZ):** Pan left/right and tilt up/down in single-step or continuous mode
        (opid 1–4, 7–10); move to an absolute horizontal (0–8000) or vertical (0–2100) position (opid 5, 11);
        trigger one-push focus at a point (opid 25); step or continuous focus near/far (opid 19–22);
        save, call, or delete presets 0–254 (opid 26, 28, 29).

        **Focus Settings (group=ptz):** Get or set focus mode (AUTO/MANUAL/ONE_PUSH), autofocus sensitivity
        (high/medium/low/ultra low), focus area (top/center/bottom/left/right/all/point), focus speed (1–10),
        and AF lock status (ZowiePTZ, ZowieCam).

        **Zoom Speed (group=ptz):** Get or set zoom speed (1–10) with optional save flag (ZowiePTZ, ZowieCam).

        **Aperture (group=ptz):** Get or set aperture value (CLOSE, F11.0–F1.6) (ZowiePTZ, ZowieCam).
      operationId: ptzEndpoint
      parameters:
        - $ref: '#/components/parameters/OptionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/GetPtzInfoRequest'
                - $ref: '#/components/schemas/SetPtzInfoRequest'
                - $ref: '#/components/schemas/PtzControlRequest'
                - $ref: '#/components/schemas/PtzControlWithValueRequest'
                - $ref: '#/components/schemas/PtzControlWithPointRequest'
                - $ref: '#/components/schemas/PtzControlPresetRequest'
                - $ref: '#/components/schemas/GetFocusModeRequest'
                - $ref: '#/components/schemas/SetFocusModeRequest'
                - $ref: '#/components/schemas/GetAfSensitivityRequest'
                - $ref: '#/components/schemas/SetAfSensitivityRequest'
                - $ref: '#/components/schemas/GetFocusZoneRequest'
                - $ref: '#/components/schemas/SetFocusZoneRequest'
                - $ref: '#/components/schemas/GetFocusSpeedRequest'
                - $ref: '#/components/schemas/SetFocusSpeedRequest'
                - $ref: '#/components/schemas/GetAfLockRequest'
                - $ref: '#/components/schemas/SetAfLockRequest'
                - $ref: '#/components/schemas/GetZoomSpeedRequest'
                - $ref: '#/components/schemas/SetZoomSpeedRequest'
                - $ref: '#/components/schemas/GetApertureRequest'
                - $ref: '#/components/schemas/SetApertureRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /streamplay:
    post:
      tags:
        - Decoding
        - NDI Decoding
      summary: Stream decoding endpoint
      description: |
        Multi-purpose stream decoding and NDI decoding endpoint for ZowieBox.

        **Stream Decoding (group=streamplay):** Add, retrieve, delete, or modify RTSP/SRT/RTMP decoding URL entries.
        Each entry has a name, URL, streamtype (local or live), and on/off switch. Query the current decoder
        state to check whether any decoding stream is active.

        **NDI Decoding (group=streamplay_ndi):** Discover NDI sources on the LAN (`ndi_find` then `ndi_get_all`),
        enable decoding of a named NDI source (`ndi_recv`), disable NDI decoding (`ndi_close`), and get or set
        the NDI receive group (`ndi_get_recv_config` / `ndi_set_recv_config`). Only one NDI decode stream
        can be active at a time.
      operationId: streamplayEndpoint
      parameters:
        - $ref: '#/components/parameters/OptionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/StreamplayAddRequest'
                - $ref: '#/components/schemas/StreamplayGetAllRequest'
                - $ref: '#/components/schemas/StreamplayDeleteRequest'
                - $ref: '#/components/schemas/StreamplayModifyRequest'
                - $ref: '#/components/schemas/GetDecoderStateRequest'
                - $ref: '#/components/schemas/NdiFindRequest'
                - $ref: '#/components/schemas/NdiGetAllRequest'
                - $ref: '#/components/schemas/NdiRecvRequest'
                - $ref: '#/components/schemas/NdiCloseRequest'
                - $ref: '#/components/schemas/NdiGetRecvConfigRequest'
                - $ref: '#/components/schemas/NdiSetRecvConfigRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /audio:
    post:
      tags:
        - Audio
      summary: Audio configuration endpoint
      description: |
        Get or set audio encoding configuration and toggle audio on/off (ZowieBox, ZowieCam, ZowiePTZ).

        **Get all audio config (group=all):** Returns all audio settings including audio source (LINE IN /
        Internal MIC / HDMI IN), codec (AAC/MP3/G.711A), bitrate, sample rate, bit width, channel (mono/stereo),
        volume, and current switch state.

        **Set audio config (group=audio):** Modify any combination of audio source, codec, bitrate (32–128 kbps),
        sample rate (8–48 kHz), channel count, and volume (0–100).

        **Audio switch (group=audio_switch):** Enable or disable audio encoding globally (0=off, 1=on).
      operationId: audioEndpoint
      parameters:
        - $ref: '#/components/parameters/OptionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/GetAudioAllRequest'
                - $ref: '#/components/schemas/SetAudioRequest'
                - $ref: '#/components/schemas/AudioSwitchRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /stream:
    post:
      tags:
        - Streaming
      summary: Stream publish endpoint
      description: |
        Manage stream publishing destinations and control live streaming (ZowieBox, ZowieCam, ZowiePTZ).

        **Add stream (opt=add_publish_info):** Save a new RTMP or SRT stream destination with URL, stream key,
        name, description, and initial on/off state.

        **Get stream status (group=getStreamStatus):** Retrieve all configured streams with their index, protocol,
        URL, key, current push status (online/offline/failed), and bandwidth.

        **Start/stop stream (opt=update_publish_switch):** Enable or disable a specific stream by its index.

        **Delete stream (opt=del_publish_info):** Remove a saved stream destination by index.

        **Reorder streams (opt=update_streams_index):** Change the display order of streams on the web UI.
        The first five entries appear as shortcut buttons on the preview interface.
      operationId: streamEndpoint
      parameters:
        - $ref: '#/components/parameters/OptionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AddPublishInfoRequest'
                - $ref: '#/components/schemas/GetStreamStatusRequest'
                - $ref: '#/components/schemas/UpdatePublishSwitchRequest'
                - $ref: '#/components/schemas/DeletePublishInfoRequest'
                - $ref: '#/components/schemas/UpdateStreamsIndexRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /network:
    post:
      tags:
        - AP
        - LAN
        - WiFi
        - Port
        - mDNS
      summary: Network configuration endpoint
      description: |
        Multi-purpose network configuration endpoint covering AP, LAN, WiFi, service ports, and mDNS
        (ZowieBox, ZowieCam, ZowiePTZ).

        **AP (group=ap):** Get AP status and SSID/password; modify SSID and password; enable or disable
        the Wi-Fi Access Point hotspot.

        **LAN (group=lan):** Get LAN IP, gateway, DNS, MAC address, and DHCP state; update static LAN
        settings (device restarts after change); check local LAN connectivity; check internet connectivity;
        get the primary display IP (LAN preferred, falls back to WiFi).

        **WiFi (group=wifi):** Enable or disable WiFi; scan for available networks; retrieve current
        connection status and IP; connect to a network by SSID and password.

        **Port (group=ports):** Get or set service port numbers for HTTP, RTMP, RTSP, RTP, VISCA TCP/UDP,
        and WebSocket. Restart the device after any port change.

        **mDNS (group=mdns):** Get or set the mDNS hostname and domain name. Device restarts after change.
      operationId: networkEndpoint
      parameters:
        - $ref: '#/components/parameters/OptionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/GetApInfoRequest'
                - $ref: '#/components/schemas/UpdateApInfoRequest'
                - $ref: '#/components/schemas/ApSwitchRequest'
                - $ref: '#/components/schemas/GetLanInfoRequest'
                - $ref: '#/components/schemas/SetLanInfoRequest'
                - $ref: '#/components/schemas/GetLocalPingRequest'
                - $ref: '#/components/schemas/GetLanPingRequest'
                - $ref: '#/components/schemas/GetMainIpRequest'
                - $ref: '#/components/schemas/WifiSwitchRequest'
                - $ref: '#/components/schemas/GetWifiListRequest'
                - $ref: '#/components/schemas/GetWifiInfoRequest'
                - $ref: '#/components/schemas/WifiConnectRequest'
                - $ref: '#/components/schemas/GetPortsInfoRequest'
                - $ref: '#/components/schemas/SetPortsInfoRequest'
                - $ref: '#/components/schemas/GetMdnsInfoRequest'
                - $ref: '#/components/schemas/SetMdnsInfoRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /system:
    post:
      tags:
        - User Management
        - Device Time
        - Tally
        - Restore & Reboot
        - Temperature
      summary: System endpoint (multi-purpose)
      description: |
        Multi-purpose system endpoint covering user management, device time, tally LED, system control,
        and CPU temperature (ZowieBox, ZowieCam, ZowiePTZ).

        **User Management (group=account):** List all accounts (admin/super/basic); add, delete, or update
        accounts by index; log in with username and password (returns a UUID session token); log out using
        the session UUID; verify account credentials and permissions.

        **Device Time (group=systime):** Get current device time, timezone, and NTP settings; set time
        manually, sync with computer, or configure an NTP server and timezone.

        **Tally LED (group=tally_led):** Get full tally info (switch, mode, color); set tally mode
        (Auto/Manual/Tally/Game/Recorder) and color (off/red/green/blue); toggle tally on/off;
        query the currently active tally color.

        **System Control (group=syscontrol):** Reboot the device; restore factory defaults; enter standby
        (power off) or exit standby (power on) (ZowieBox, ZowiePTZ, ZowieCam, MediCam).

        **CPU Temperature (group=get_cpu_temp):** Retrieve the current CPU temperature in degrees Celsius
        (ZowieBox, ZowieBox-SDI, ZowieKBD, ZowiePTZ, ZowieCam).
      operationId: systemEndpoint
      parameters:
        - $ref: '#/components/parameters/OptionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/GetAccountsInfoRequest'
                - $ref: '#/components/schemas/DeleteAccountRequest'
                - $ref: '#/components/schemas/AddAccountRequest'
                - $ref: '#/components/schemas/UpdateAccountRequest'
                - $ref: '#/components/schemas/LoginRequest'
                - $ref: '#/components/schemas/LogoutRequest'
                - $ref: '#/components/schemas/VerifyAccountRequest'
                - $ref: '#/components/schemas/GetSystimeRequest'
                - $ref: '#/components/schemas/SetSystimeRequest'
                - $ref: '#/components/schemas/GetTallyInfoRequest'
                - $ref: '#/components/schemas/SetTallyInfoRequest'
                - $ref: '#/components/schemas/SetTallySwitchRequest'
                - $ref: '#/components/schemas/GetTallyColorRequest'
                - $ref: '#/components/schemas/RebootRequest'
                - $ref: '#/components/schemas/RestoreFactoryRequest'
                - $ref: '#/components/schemas/StandbyRequest'
                - $ref: '#/components/schemas/ExitStandbyRequest'
                - $ref: '#/components/schemas/GetCpuTempRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /storage:
    post:
      tags:
        - Recording
      summary: Storage status endpoint
      description: |
        Get the current status of all connected storage devices (SD card, USB, NAS) including mount state,
        total capacity, free space, used space, and file system format (FAT32/exFAT/NTFS/CIFS/NFS).
        Status codes: 0=not mounted, 1=mounted, 2=full, 3=read-only, 4=mount failed.
        Supported on ZowieBox, ZowieCam, ZowiePTZ.
      operationId: storageEndpoint
      parameters:
        - $ref: '#/components/parameters/OptionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetStorageStatusRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /record:
    post:
      tags:
        - Recording
      summary: Recording task endpoint
      description: |
        Manage video recording tasks to USB, SD card, or NAS storage (ZowieBox, ZowieCam, ZowiePTZ).

        **Get task list (opt=get_task_list):** Returns all recording tasks with their current status
        (not recording / recording / paused / storage full / not mounted / no signal), file format,
        loop mode, and associated storage device info.

        **Modify task settings (opt=set_task_info):** Update a recording task's name, filename prefix,
        video format (MP4/TS/MOV), recording mode (manual/auto-start), loop recording, and file split
        settings (by size: auto/1.5G/3G/4G, or by time: auto/15min/30min/45min).

        **Start/stop/pause recording (opt=set_task_enable):** Control recording for a specific storage
        device index (usb1_0 / sdcard_0 / nas1_0). Only one storage device should be recording at a time
        to prevent file corruption.

        **Get video file list (opt=get_task_savefiles_page):** Retrieve a paginated list of recorded video
        files for a storage device, with optional filtering by case number.
      operationId: recordEndpoint
      parameters:
        - $ref: '#/components/parameters/OptionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/GetTaskListRequest'
                - $ref: '#/components/schemas/SetTaskInfoRequest'
                - $ref: '#/components/schemas/SetTaskEnableRequest'
                - $ref: '#/components/schemas/GetTaskSaveFilesRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /snapshot:
    post:
      tags:
        - Snapshot
      summary: Snapshot endpoint
      description: |
        Take snapshots and retrieve captured photo files (ZowieBox, ZowiePTZ, MediDVR, ZowieCam).

        **Take snapshot (option=takephoto):** Capture 1 to 3 photos in a single request. Photos are saved
        to the connected storage device.

        **Get photo list (option=getinfo):** Retrieve a paginated list of captured photos for a specified
        storage device (0=SD card, 1=USB, 3=NAS). Supports filtering by case number. Each entry includes
        filename, file URL, thumbnail path, creation time, resolution, and the associated recording file
        (if the photo was taken during a recording session).
      operationId: snapshotEndpoint
      parameters:
        - name: option
          in: query
          required: true
          schema:
            type: string
            enum:
              - takephoto
              - getinfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/TakePhotoRequest'
                - $ref: '#/components/schemas/GetPhotoListRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /camera:
    post:
      tags:
        - Image Settings
      summary: Camera image settings endpoint
      description: |
        Get or set camera image quality parameters (ZowiePTZ, ZowieCam).

        **Exposure (opt=get/set_exposure_info):** Mode (Auto/Manual/ShutterFirst/ApertureFirst/BrightFirst),
        gain (0–16), shutter speed (1/25–1/10000), WDR (0–8), anti-flicker (disable/50Hz/60Hz/auto),
        exposure compensation (±3), backlight compensation, metering (average/center/spot/matrix),
        and ISO sensitivity.

        **White Balance (opt=get/set_white_balance_info):** Mode (Auto/Manual/VAR/OnePush),
        color temperature preset (3000K–6500K), red/blue gain (0–255), saturation (1–100),
        hue (−180 to 180), and IR cut filter (day/night).

        **Image (opt=get/set_image_info):** Brightness (0–8), contrast (0–15), sharpness (0–10),
        gamma (0–8), image flip (disable/H-Flip/V-Flip/HV-Flip/Auto), and color or grayscale mode.

        **Noise Reduction (opt=get/set_nr_info):** 2D NR strength (0–8), 3D NR strength (0–8),
        and lens correction level (0–5).

        **Style (opt=get/set_style_info):** Select from preset image styles: default, normal, clarity,
        bright, soft, or beautify.

        **AE Lock (opt=get/set_ae_lock_status):** Get or set auto-exposure lock (0=off, 1=on).
      operationId: cameraEndpoint
      parameters:
        - $ref: '#/components/parameters/OptionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/GetExposureInfoRequest'
                - $ref: '#/components/schemas/SetExposureInfoRequest'
                - $ref: '#/components/schemas/GetWhiteBalanceInfoRequest'
                - $ref: '#/components/schemas/SetWhiteBalanceInfoRequest'
                - $ref: '#/components/schemas/GetImageInfoRequest'
                - $ref: '#/components/schemas/SetImageInfoRequest'
                - $ref: '#/components/schemas/GetNrInfoRequest'
                - $ref: '#/components/schemas/SetNrInfoRequest'
                - $ref: '#/components/schemas/GetStyleInfoRequest'
                - $ref: '#/components/schemas/SetStyleInfoRequest'
                - $ref: '#/components/schemas/GetAeLockRequest'
                - $ref: '#/components/schemas/SetAeLockRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /patient:
    post:
      tags:
        - Patient Case
      summary: Patient case management endpoint (MediDVR)
      description: |
        Create and query patient case records. This endpoint is specific to MediDVR devices.

        **Create patient case (opt=add_message_task):** Register a new patient record with first, second,
        and third name, date of birth, patient ID, doctor name, gender (male/female), case number,
        examination findings, check prompts, and optional patient_id for linking.

        **Query cases (opt=get_message_task):** Retrieve all patient cases with full details including
        check time, case path on storage, total case count, and associated video/photo files.
      operationId: patientEndpoint
      parameters:
        - $ref: '#/components/parameters/OptionParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AddPatientRequest'
                - $ref: '#/components/schemas/GetPatientCasesRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
  /ptzctrl:
    post:
      tags:
        - Pan/Tilt/Zoom/Focus Control
      summary: PTZ control transmit endpoint (ZowieBox/ZowieBox-SDI/ZowieKBD)
      description: |
        Transmit PTZ camera control commands from a ZowieBox, ZowieBox-SDI, or ZowieKBD controller
        to a connected camera via VISCA, ONVIF, Pelco-D, Pelco-P, or NDI protocol.
        All operations use `option=transmit`.

        **Pan/Tilt (opt=pan_tilt):** Control pan and tilt speed/direction simultaneously. Speed range −10 to 10;
        0=stop, negative=right/down, positive=left/up.

        **Zoom (opt=zoom):** Control zoom speed/direction. Speed range −10 to 10; 0=stop,
        negative=zoom out, positive=zoom in.

        **Go Home (opt=gohome):** Return camera to its default home position.

        **Presets (opt=set_preset / recall_preset / clear_preset):** Save, recall, or delete a preset
        position by preset_id. NDI protocol restricts preset_id to 0–99. Clear preset is not supported
        on NDI protocol.

        **Focus Mode (opt=set_focus_mode / get_focus_mode):** Set or get focus mode: 0=Auto, 1=Manual,
        2=OnePush (OnePush supported on VISCA protocol only). Mode setting requires VISCA, ONVIF, NDI,
        or Pelco-D protocol.

        **Continuous Focus (opt=focus):** Adjust focus direction and speed (−10 to 10); negative=focus far,
        positive=focus near, 0=stop.
      operationId: ptzctrlEndpoint
      parameters:
        - name: option
          in: query
          required: true
          schema:
            type: string
            enum:
              - transmit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/PanTiltControlRequest'
                - $ref: '#/components/schemas/ZoomControlRequest'
                - $ref: '#/components/schemas/GoHomeRequest'
                - $ref: '#/components/schemas/SetPresetCtrlRequest'
                - $ref: '#/components/schemas/RecallPresetCtrlRequest'
                - $ref: '#/components/schemas/ClearPresetCtrlRequest'
                - $ref: '#/components/schemas/SetFocusModeCtrlRequest'
                - $ref: '#/components/schemas/GetFocusModeCtrlRequest'
                - $ref: '#/components/schemas/FocusCtrlRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          description: Bad request or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
components:
  parameters:
    OptionParam:
      name: option
      in: query
      required: true
      schema:
        type: string
        enum:
          - getinfo
          - setinfo
      description: 'getinfo to retrieve data, setinfo to modify data'
  schemas:
    GenericResponse:
      type: object
      properties:
        status:
          type: string
          description: Status code (00000 = success)
          example: '00000'
        rsp:
          type: string
          description: Human-readable status description
          example: succeed
    GetInputInfoRequest:
      type: object
      description: Detect input signal (ZowieBox). option=getinfo
      properties:
        group:
          type: string
          enum:
            - hdmi
        opt:
          type: string
          enum:
            - get_input_info
      required:
        - group
        - opt
    SetOutputInfoRequest:
      type: object
      description: 'Set output resolution/audio/loopout (ZowieBox, ZowieCam, ZowiePTZ). option=setinfo'
      properties:
        group:
          type: string
          enum:
            - hdmi
        opt:
          type: string
          enum:
            - set_output_info
        data:
          type: object
          properties:
            format:
              type: string
              enum:
                - 2160p30
                - 2160p25
                - 2160p24
                - 1080p60
                - 1080p50
                - 1080p30
                - 1080p25
                - 1080p24
                - 1080i60
                - 1080i50
                - 720p60
                - 720p50
              description: Output resolution
            audio_switch:
              type: integer
              enum:
                - 0
                - 1
              description: '0=mute, 1=unmute'
            loop_out_switch:
              type: integer
              enum:
                - 0
                - 1
              description: '0=output, 1=loop out (ZowieBox only)'
          required:
            - format
      required:
        - group
        - opt
        - data
    GetOutputInfoRequest:
      type: object
      description: 'Get current output info (ZowieBox, ZowiePTZ, ZowieCam). option=getinfo'
      properties:
        group:
          type: string
          enum:
            - hdmi
        opt:
          type: string
          enum:
            - get_output_info
      required:
        - group
        - opt
    GetPtzInfoRequest:
      type: object
      description: Get PTZ camera configuration (ZowieBox). option=getinfo
      properties:
        group:
          type: string
          enum:
            - ptz
        opt:
          type: string
          enum:
            - get_ptz_info
      required:
        - group
        - opt
    SetPtzInfoRequest:
      type: object
      description: Set PTZ camera configuration (ZowieBox). option=setinfo
      properties:
        group:
          type: string
          enum:
            - ptz
        opt:
          type: string
          enum:
            - set_ptz_info
        data:
          type: object
          properties:
            protocol:
              type: integer
              description: '0=auto, 1=VISCA over IP, 3=VISCA, 4=Pelco-D, 5=Pelco-P'
              enum:
                - 0
                - 1
                - 3
                - 4
                - 5
            type:
              type: integer
              description: 'Transfer protocol when protocol=1: 0=TCP, 1=UDP'
              enum:
                - 0
                - 1
            ip:
              type: string
              description: IP of controlled camera
            baudrate_id:
              type: integer
              description: '0=2400, 1=4800, 2=9600, 3=11920, 4=38400'
              enum:
                - 0
                - 1
                - 2
                - 3
                - 4
            port:
              type: integer
              minimum: 1025
              maximum: 65535
            addr:
              type: integer
              description: Camera address
            addr_fix:
              type: integer
              enum:
                - 0
                - 1
              description: '0=on, 1=off'
      required:
        - group
        - opt
        - data
    PtzControlRequest:
      type: object
      description: |
        PTZ one-step or continuous control (ZowiePTZ). option=setinfo
        opid values: 1=pan right (step), 2=pan right (continuous), 3=pan left (step),
        4=pan left (continuous), 7=tilt up (step), 8=tilt up (continuous),
        9=tilt down (step), 10=tilt down (continuous), 19=focus near (step),
        20=focus near (continuous), 21=focus far (step), 22=focus far (continuous)
      properties:
        group:
          type: string
          enum:
            - ptz
        opt:
          type: string
          enum:
            - control
        opid:
          type: integer
          enum:
            - 1
            - 2
            - 3
            - 4
            - 7
            - 8
            - 9
            - 10
            - 19
            - 20
            - 21
            - 22
      required:
        - group
        - opt
        - opid
    PtzControlWithValueRequest:
      type: object
      description: |
        Specify absolute horizontal (opid=5) or vertical (opid=11) position (ZowiePTZ). option=setinfo
      properties:
        group:
          type: string
          enum:
            - ptz
        opt:
          type: string
          enum:
            - control
        opid:
          type: integer
          enum:
            - 5
            - 11
          description: '5=horizontal position, 11=vertical position'
        data:
          type: object
          properties:
            value:
              type: integer
              description: 'opid=5: 0–8000; opid=11: 0–2100'
          required:
            - value
      required:
        - group
        - opt
        - opid
        - data
    PtzControlWithPointRequest:
