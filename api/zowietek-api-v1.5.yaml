    SetEncodingRequest:
      type: object
      description: "Modify encoding parameters. option=setinfo, endpoint=/video"
      properties:
        group:
          type: string
          enum: [venc]
        venc:
          type: array
          items:
            type: object
            properties:
              venc_chnid:
                type: integer
                description: "0=main, 1=sub, 2=snapshot"
              codec:
                type: object
                properties:
                  selected_id:
                    type: integer
                    enum: [0, 1, 2]
                    description: "0=H.264, 1=H.265, 2=MJPEG"
                  codec_list:
                    type: array
                    items:
                      type: string
              profile:
                type: object
                properties:
                  selected_id:
                    type: integer
                    enum: [0, 1, 2]
                    description: "0=BP, 1=MP, 2=HP"
              ratecontrol:
                type: object
                properties:
                  selected_id:
                    type: integer
                    enum: [0, 1]
                    description: "0=CBR, 1=VBR"
              bitrate:
                type: integer
                description: "Main: 64–51200, Sub: 64–25600 (kbps)"
              ndi_bitrate_pre:
                type: integer
                minimum: 50
                maximum: 125
              width:
                type: integer
                enum: [3840, 2560, 1920, 1280, 1080, 720, 640, 320]
              height:
                type: integer
                enum: [2160, 1440, 1080, 1280, 1920, 720, 360, 180]
              framerate:
                type: integer
                enum: [60, 50, 30, 25, 15]
              keyinterval:
                type: integer
                minimum: 20
                maximum: 240
              gop:
                type: integer
              MaxQP:
                type: integer
              MinQP:
                type: integer
              keyMinQP:
                type: integer
              QPlevel:
                type: integer
              rotate:
                type: object
                properties:
                  selected_id:
                    type: integer
                    enum: [0, 1, 2, 3]
                    description: "0=0°, 1=90°, 2=180°, 3=270°"
              stream_id:
                type: integer
                enum: [0, 1, 2]
              desc:
                type: string
      required: [group, venc]

