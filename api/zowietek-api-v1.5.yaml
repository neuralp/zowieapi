          type: string
          enum: [recall_preset]
        data:
          type: object
          properties:
            preset_id:
              type: integer
            pan_speed:
              type: integer
            tilt_speed:
              type: integer
            zoom_speed:
              type: integer
          required: [preset_id]
      required: [group, opt, data]

    ClearPresetCtrlRequest:
      type: object
      description: "Delete a preset position (ZowieBox). NDI protocol not supported. option=transmit"
      properties:
        group:
          type: string
          enum: [ptz_ctrl]
        opt:
          type: string
          enum: [clear_preset]
        data:
          type: object
          properties:
            preset_id:
              type: integer
          required: [preset_id]
      required: [group, opt, data]

    SetFocusModeCtrlRequest:
      type: object
      description: "Set focus mode via ptzctrl (ZowieBox). option=transmit"
      properties:
        group:
          type: string
          enum: [ptz_ctrl]
        opt:
          type: string
          enum: [set_focus_mode]
        data:
          type: object
          properties:
            mode_id:
              type: integer
              enum: [0, 1, 2]
              description: "0=Auto, 1=Manual, 2=OnePush (Visca only)"
          required: [mode_id]
      required: [group, opt, data]

    GetFocusModeCtrlRequest:
      type: object
      description: "Get focus mode via ptzctrl (ZowieBox). option=transmit"
      properties:
        group:
          type: string
          enum: [ptz_ctrl]
        opt:
          type: string
          enum: [get_focus_mode]
      required: [group, opt]

    FocusCtrlRequest:
      type: object
      description: "Continuous focus control (ZowieBox). option=transmit"
      properties:
        group:
          type: string
          enum: [ptz_ctrl]
        opt:
          type: string
          enum: [focus]
        data:
          type: object
          properties:
            focus_speed:
