              type: object
              properties:
                selected_id:
                  type: integer
                  enum: [0, 1, 2, 3, 4]
                  description: "0=32000, 1=48000, 2=64000, 3=96000, 4=128000"
            sample_rate:
              type: object
              properties:
                selected_id:
