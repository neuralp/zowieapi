info:
  name: Set Stream NDI Name
  type: http
  seq: 4

http:
  method: POST
  url: "{{ZowieBase}}/streamplay?option=setinfo"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  params:
    - name: option
      value: setinfo
      type: query
  body:
    type: json
    data: "{\r

      \    \"group\": \"streamplay_ndi\",\r

      \    \"opt\": \"ndi_recv\",\r

      \    \"data\": {\r

      \        \"ndi_name\": \"ZOWIEPTZ (ZowiePTZ-32637)\"\r

      \    }\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
