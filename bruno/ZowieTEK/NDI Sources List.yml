info:
  name: NDI Sources List
  type: http
  seq: 6

http:
  method: POST
  url: "{{ZowieBase}}/streamplay?option=getinfo"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  params:
    - name: option
      value: getinfo
      type: query
  body:
    type: json
    data: "{\r

      \    \"group\": \"streamplay_ndi\",\r

      \    \"opt\": \"ndi_get_all\"\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
