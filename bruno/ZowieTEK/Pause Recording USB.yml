info:
  name: Pause Recording USB
  type: http
  seq: 8

http:
  method: POST
  url: "{{ZowieBase}}/record?option=setinfo"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  params:
    - name: login_check_flag
      value: "1"
      type: query
      disabled: true
    - name: option
      value: setinfo
      type: query
  body:
    type: json
    data: "{\r

      \    \"group\": \"record\",\r

      \    \"opt\": \"set_task_enable\",\r

      \    \"data\": {\r

      \        \"index\": \"usb1_0\",\r

      \        \"enable\": 2\r

      \    }\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
