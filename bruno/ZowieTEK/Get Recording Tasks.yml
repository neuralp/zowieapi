info:
  name: Get Recording Tasks
  type: http
  seq: 10

http:
  method: POST
  url: "{{ZowieBase}}/record?option=getinfo"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  params:
    - name: option
      value: getinfo
      type: query
  body:
    type: json
    data: "{\r

      \    \"group\": \"record\",\r

      \    \"opt\": \"get_task_list\"\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
