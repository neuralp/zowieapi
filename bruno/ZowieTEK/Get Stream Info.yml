info:
  name: Get Stream Info
  type: http
  seq: 3

http:
  method: POST
  url: "{{ZowieBase}}/streamplay?option=getinfo"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  params:
    - name: option
      value: getinfo
      type: query
  body:
    type: json
    data: |-
      {
        "group": "streamplay", 
        "opt": "streamplay_get_all"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
