info:
  name: Set Stream Live Index 0
  type: http
  seq: 2

http:
  method: POST
  url: "{{ZowieBase}}/streamplay?option=setinfo"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  params:
    - name: option
      value: setinfo
      type: query
  body:
    type: json
    data: |-
      {
        "group": "streamplay",
        "opt": "streamplay_switch",
        "data": {
          "switch": 1,
          "index": 0
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
