info:
  name: Set Stream Live Index 0
  type: http
  seq: 2

http:
  method: POST
  url: "{{ZowieBase}}/streamplay?option=setinfo"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  params:
    - name: option
      value: setinfo
      type: query
  body:
    type: json
    data: "{\r

      \    \"group\": \"streamplay\",\r

      \    \"opt\": \"streamplay_switch\",\r

      \    \"data\": {\r

      \        \"index\": 0,\r

      \        \"switch\": 1\r

      \    }\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
