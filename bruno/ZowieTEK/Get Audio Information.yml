info:
  name: Get Audio Information
  type: http
  seq: 1

http:
  method: POST
  url: "{{ZowieBase}}/audio?option=getinfo"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  params:
    - name: option
      value: getinfo
      type: query
  body:
    type: json
    data: "{\r\n    \"group\": \"all\"\r\n}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
